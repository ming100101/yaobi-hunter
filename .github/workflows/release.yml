name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
        default: "0.1.0-beta.1"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          }
          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid release version: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
      - name: Run full test suite
        run: npm run test:all
      - name: Run release checks and package Windows app
        shell: pwsh
        run: ./scripts/package-release.ps1 -Version '${{ steps.version.outputs.version }}'
      - name: Smoke-test packaged Windows app
        shell: pwsh
        run: ./scripts/test-release-package.ps1 -Version '${{ steps.version.outputs.version }}'
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: YaobiHunter-v${{ steps.version.outputs.version }}-windows-x64
          path: |
            release/YaobiHunter-v${{ steps.version.outputs.version }}-windows-x64.zip
            release/SHA256SUMS.txt
          if-no-files-found: error
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ github.ref_name }}' `
            'release/YaobiHunter-v${{ steps.version.outputs.version }}-windows-x64.zip' `
            'release/SHA256SUMS.txt' `
            --title 'Yaobi Hunter ${{ github.ref_name }}' `
            --notes-file 'release/RELEASE-NOTES-TEMPLATE.md' `
            --prerelease
